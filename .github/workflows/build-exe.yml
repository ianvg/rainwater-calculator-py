name: Build Windows EXE
  
on:
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build executable
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build_exe.ps1

      - name: Smoke-test executable
        shell: pwsh
        env:
          RWH_APP_DATA_DIR: ${{ runner.temp }}/rwh-calculator-exe-smoke
        run: |
          $process = Start-Process -FilePath .\dist\RainwaterCalculator.exe -ArgumentList '--smoke-test' -WindowStyle Hidden -PassThru -Wait
          if ($process.ExitCode -ne 0) {
            throw "Executable smoke test failed with exit code $($process.ExitCode)."
          }

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build per-user installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build_installer.ps1 -SkipExecutableBuild

      - name: Upload executable artifact
        uses: actions/upload-artifact@v6
        with:
          name: RainwaterCalculator-windows
          path: |
            dist/RainwaterCalculator.exe
            dist/RainwaterCalculator-Setup-*.exe
            dist/RainwaterCalculator.cdx.json
