name: Quality checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e ".[dev,docs]"
      - name: Run tests with coverage
        run: >-
          python -m pytest -q
          --cov=rainwater_app
          --cov=tkinter_app
          --cov-report=term
          --cov-report=xml:coverage.xml
          --cov-report=html:htmlcov
      - name: Upload coverage report
        if: ${{ always() && matrix.python-version == '3.10' }}
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: error
          retention-days: 14
      - name: Check code quality
        run: python -m ruff check .
      - name: Build documentation
        if: matrix.python-version == '3.10'
        run: python -m mkdocs build --strict

  windows-smoke:
    name: Windows desktop smoke test
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install application
        run: python -m pip install -e ".[dev]"
      - name: Import and smoke-test the desktop entry point
        env:
          RWH_APP_DATA_DIR: ${{ runner.temp }}/rwh-calculator-smoke
        run: python tkinter_app.py --smoke-test

  viewer-smoke:
    name: Optional Streamlit viewer smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install viewer dependencies
        run: python -m pip install -e ".[viewer]"
      - name: Render the read-only viewer
        env:
          RWH_APP_DATA_DIR: ${{ runner.temp }}/rwh-calculator-viewer
        run: >-
          python -c "from streamlit.testing.v1 import AppTest;
          app = AppTest.from_file('streamlit_app.py').run(timeout=20);
          assert not app.exception, [item.value for item in app.exception]"

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install audited dependency set
        run: python -m pip install -e ".[dev,docs,viewer,security]"
      - name: Audit installed dependencies
        run: python -m pip_audit --strict --progress-spinner off
