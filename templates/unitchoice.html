{% extends "bootstrap/base.html" %}
{% import "bootstrap/wtf.html" as wtf %}
{% block content %}

<div class="container">
    <div class="row">
        <div class="jumbotron">
            <h1 class="display-4">Enter unit choice</h1>
            <form method="POST" action="{{ url_for('unit_choice') }}">
                {% for subfield in form.example %}
                <p class="lead"> {{ subfield }} {{ subfield.label }} </p>
                {% endfor %}
                <input class="btn btn-primary" type="submit" value="Submit Choice">
            </form>
        </div>
    </div>
</div>


{% endblock %}
